<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Générateur d'Histoire</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Silkscreen&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass: rgba(8,10,20,0.6);
      --glass2: rgba(8,10,20,0.5);
      --border: rgba(255,255,255,0.13);
      --border-focus: rgba(160,210,255,0.6);
      --text: #eef2ff;
      --muted: rgba(200,215,255,0.55);
      --muted2: rgba(150,165,220,0.35);
      --accent: #7dd3fc;
      --accent2: #c4b5fd;
      --glow: rgba(125,211,252,0.13);
      --success: #6ee7b7;
      --random-color: #fde68a;
      --random-border: rgba(253,230,138,0.4);
      --random-bg: rgba(253,230,138,0.08);
    }

    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }

    body { background: #06080f; position: relative; }

    /* ── STATIC HOLOGRAPHIC BACKGROUND ── */
    .holo-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Saturated static gradient mesh */
    .holo-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 25%, rgba(99,102,241,0.9)  0%, transparent 55%),
        radial-gradient(ellipse 65% 50% at 83% 72%, rgba(14,165,233,0.85) 0%, transparent 50%),
        radial-gradient(ellipse 55% 65% at 58%  8%, rgba(168,85,247,0.8)  0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at  8% 82%, rgba(20,184,166,0.75) 0%, transparent 50%),
        radial-gradient(ellipse 80% 40% at 88% 18%, rgba(236,72,153,0.7)  0%, transparent 50%);
      filter: blur(38px) saturate(2);
    }

    /* Diagonal sheen — static */
    .holo-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        118deg,
        transparent 10%,
        rgba(255,255,255,0.06) 35%,
        rgba(210,235,255,0.1) 50%,
        rgba(255,255,255,0.05) 65%,
        transparent 85%
      );
      pointer-events: none;
    }

    /* Scan lines */
    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(180,220,255,0.025) 3px,
        rgba(180,220,255,0.025) 4px
      );
      pointer-events: none;
    }

    /* ── APP SHELL ── */
    .app {
      position: relative;
      z-index: 1;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── FIELDS ── */
    .fields {
      flex: 1;
      overflow-y: auto;
      padding: 18px 24px 12px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px 22px;
      align-content: start;
    }

    .title {
      text-align: center;
      padding: 16px 24px 2px;
      flex-shrink: 0;
      font-family: 'Silkscreen', cursive;
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #7dd3fc 0%, #c4b5fd 55%, #f9a8d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .fields::-webkit-scrollbar { width: 3px; }
    .fields::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field.full { grid-column: 1 / -1; }

    .field label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      overflow: hidden;
    }

    .input-wrap:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--glow);
      background: rgba(10,15,30,0.7);
    }

    .input-icon {
      padding: 5px 10px;
      font-size: 2rem;
      line-height: 1;
      flex-shrink: 0;
      user-select: none;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .field input {
      flex: 1;
      padding: 7px 12px 7px 0;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      outline: none;
      min-width: 0;
    }

    .field input::placeholder { color: var(--muted2); }

    .row-2 {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 22px;
    }

    .random-field {
      padding: 7px 12px;
      border-radius: 8px;
      background: var(--random-bg);
      border: 1px dashed var(--random-border);
      font-size: 16px;
      color: var(--random-color);
      font-weight: 500;
      min-height: 34px;
      display: flex;
      align-items: center;
      gap: 7px;
      backdrop-filter: blur(14px);
    }

    .random-field span:first-child { font-size: 2rem; line-height: 1; }

    .random-field .hint {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 400;
      font-style: italic;
    }

    footer {
      padding: 10px 0;
      border-top: 1px solid var(--border);
      display: block;
      flex-shrink: 0;
      background: var(--glass2);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .footer-inner {
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
    }

    .footer-hint { font-size: 0.7rem; color: var(--muted); white-space: nowrap; text-align: center; }
    .footer-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; justify-content: flex-end; }
    .sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

    .btn {
      padding: 12px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
      border: none;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .btn-generate {
      flex: 1;
      justify-content: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #06060f;
      font-weight: 700;
      box-shadow: 0 0 18px rgba(125,211,252,0.35), 0 0 40px rgba(196,181,253,0.2);
    }
    .btn-generate:hover {
      box-shadow: 0 0 28px rgba(125,211,252,0.55), 0 0 60px rgba(196,181,253,0.3);
      transform: translateY(-1px);
    }
    .btn-generate:active { transform: translateY(0); }
    .btn-generate.copied {
      background: linear-gradient(135deg, #6ee7b7, #34d399);
      box-shadow: 0 0 18px rgba(110,231,183,0.4);
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .pop { animation: pop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  </style>
</head>
<body>

<div class="holo-bg">
  <div class="scanlines"></div>
</div>

<div class="app">

  <div class="title">Robostories</div>

  <div class="fields">

    <div class="field">
      <label>Héros</label>
      <div class="input-wrap">
        <span class="input-icon">👸🏼</span>
        <input autocapitalize="none" id="choix_heros" type="text" placeholder="une petite sorcière, un dragon timide…"/>
      </div>
    </div>

    <div class="field">
      <label>Compagnon</label>
      <div class="input-wrap">
        <span class="input-icon">🦄</span>
        <input autocapitalize="none" id="choix_compagnon" type="text" placeholder="un lapin bavard, un robot rouillé…"/>
      </div>
    </div>

    <div class="field">
      <label>Antagoniste</label>
      <div class="input-wrap">
        <span class="input-icon">👻</span>
        <input autocapitalize="none" id="choix_antagoniste" type="text" placeholder="un géant bougon, une reine de glace…"/>
      </div>
    </div>

    <div class="field">
      <label>Lieu</label>
      <div class="input-wrap">
        <span class="input-icon">🏰</span>
        <input autocapitalize="none" id="choix_lieu" type="text" placeholder="une forêt enchantée, une ville dans les nuages…"/>
      </div>
    </div>

    <div class="field full">
      <label>Objet de l'intrigue</label>
      <div class="input-wrap">
        <span class="input-icon">🪎</span>
        <input autocapitalize="none" id="choix_objet" type="text" placeholder="une clé dorée, un livre magique…"/>
      </div>
    </div>

    <div class="field full">
      <label>Valeur transmise</label>
      <div class="random-field" id="random-display">
        <span>🎲</span>
        <span class="hint">Tirée au sort lors de la génération</span>
      </div>
    </div>

    <div class="row-2">
      <div class="field">
        <label>Âge (ans)</label>
        <div class="input-wrap">
          <span class="input-icon">🎂</span>
          <input autocapitalize="none" id="age_enfant" type="number" min="1" max="18" placeholder="6"/>
        </div>
      </div>
      <div class="field">
        <label>Durée (min)</label>
        <div class="input-wrap">
          <span class="input-icon">⏱</span>
          <input autocapitalize="none" id="duree_histoire" type="number" min="1" max="60" placeholder="10"/>
        </div>
      </div>
    </div>

  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-hint" id="footer-hint">
        Remplis les champs puis clique sur <strong style="color:var(--accent)">Générer</strong>
      </div>
      <div class="footer-actions">
        <button class="btn btn-ghost" onclick="resetAll()">↺ Reset</button>
        <div class="sep"></div>
        <button class="btn btn-generate" id="generateBtn" onclick="generate()">Générer &amp; Copier</button>
      </div>
    </div>
  </footer>

</div>

<script>
  const VALUES = [
    "l'amitié","l'amour","la confiance en soi","la coopération","la curiosité",
    "la diversité","l'empathie","la justice","la persévérance",
    "le respect de l'environnement","la responsabilité"
  ];

  const inputFields = ['choix_heros','choix_compagnon','choix_antagoniste','choix_lieu','choix_objet','age_enfant','duree_histoire'];

  const template = [
    { text: "Peux-tu me créer une histoire avec " },{ key: "choix_heros" },
    { text: " pour héros, qui a pour compagnon " },{ key: "choix_compagnon" },
    { text: ". L'antagoniste est " },{ key: "choix_antagoniste" },
    { text: ". L'histoire se passe dans " },{ key: "choix_lieu" },
    { text: " avec comme objet pour l'intrigue\u00a0: " },{ key: "choix_objet" },
    { text: ". La valeur à transmettre dans cette histoire est\u00a0: " },{ key: "valeur_aleatoire" },
    { text: ". C'est une histoire pour un enfant de " },{ key: "age_enfant" },
    { text: " ans et le temps de lecture doit être de " },{ key: "duree_histoire" },
    { text: " minutes." }
  ];

  let generatedValue = null;

  function buildPlainText() {
    const vals = {};
    inputFields.forEach(id => { vals[id] = document.getElementById(id).value.trim(); });
    vals['valeur_aleatoire'] = generatedValue || '{valeur_aleatoire}';
    return template.map(s => s.text !== undefined ? s.text : (vals[s.key] || `{${s.key}}`)).join('');
  }

  function generate() {
    generatedValue = VALUES[Math.floor(Math.random() * VALUES.length)];

    const disp = document.getElementById('random-display');
    disp.innerHTML = `<span>🎲</span> ${generatedValue}`;
    disp.classList.remove('pop');
    void disp.offsetWidth;
    disp.classList.add('pop');

    // Copy to clipboard immediately
    navigator.clipboard.writeText(buildPlainText()).then(() => {
      const btn = document.getElementById('generateBtn');
      btn.textContent = '✓ Copié !';
      btn.classList.add('copied');
      document.getElementById('footer-hint').innerHTML =
        'Prompt copié\u00a0! Colle-le directement dans <strong style="color:var(--accent)">ChatGPT</strong>.';
      setTimeout(() => {
        btn.innerHTML = 'Générer &amp; Copier';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function resetAll() {
    inputFields.forEach(id => { document.getElementById(id).value = ''; });
    generatedValue = null;
    document.getElementById('random-display').innerHTML =
      `<span>🎲</span><span class="hint">Tirée au sort lors de la génération</span>`;
    document.getElementById('footer-hint').innerHTML =
      'Remplis les champs puis clique sur <strong style="color:var(--accent)">Générer</strong>';
    const btn = document.getElementById('generateBtn');
    btn.innerHTML = 'Générer &amp; Copier';
    btn.classList.remove('copied');
  }
</script>
</body>
</html>
